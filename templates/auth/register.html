{% extends "base.html" %}
{% block content %}
<div class="container mx-auto px-4 py-16 flex justify-center items-center h-full">
    <div class="bg-white dark:bg-darkCard p-8 rounded-2xl shadow-2xl w-full max-w-md border dark:border-gray-800">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Join the Platform</h2>
            <p class="text-gray-500 dark:text-gray-400">Create your citizen account today</p>
        </div>
        
        <form method="POST" action="">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Choose a username">
            </div>
            
            <div class="mb-8">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-darkBg border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Create a secure password">
            </div>
            
            <button type="submit" class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-primary/30 transition-all transform hover:-translate-y-1">
                Register
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary hover:underline font-medium">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
